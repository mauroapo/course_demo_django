{% extends 'core/base.html' %}

{% block title %}Esqueci Minha Senha - Plataforma de Cursos{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Esqueci Minha Senha</h1>
        <p class="auth-subtitle">Digite seu email para receber um código de verificação.</p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="seu@email.com" required
                    autofocus>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Enviar Código
            </button>
        </form>

        <div class="auth-links">
            <a href="{% url 'login' %}">← Voltar ao Login</a>
        </div>
    </div>
</div>
{% endblock %}
