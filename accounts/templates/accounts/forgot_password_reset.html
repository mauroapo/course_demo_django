{% extends 'core/base.html' %}

{% block title %}Nova Senha - Plataforma de Cursos{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Definir Nova Senha</h1>
        <p class="auth-subtitle">Criando nova senha para: <strong>{{ user_email }}</strong></p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="password" class="form-label">Nova Senha</label>
                <input type="password" id="password" name="password" class="form-input"
                    placeholder="Mínimo 8 caracteres" required autofocus minlength="8">
                <small class="form-help">A senha deve ter pelo menos 8 caracteres.</small>
            </div>

            <div class="form-group">
                <label for="password_confirm" class="form-label">Confirmar Nova Senha</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-input"
                    placeholder="Digite a senha novamente" required minlength="8">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Redefinir Senha
            </button>
        </form>

        <div class="auth-links">
            <a href="{% url 'login' %}">← Voltar ao Login</a>
        </div>
    </div>
</div>

<style>
    .form-help {
        display: block;
        margin-top: 0.25rem;
        font-size: 0.875rem;
        color: var(--text-gray);
    }
</style>
{% endblock %}
