version: "3.8"

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ong_platform
      - POSTGRES_USER=ong_user
      - POSTGRES_PASSWORD=ong_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ong_user -d ong_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn --chdir /app --bind 0.0.0.0:8001 --workers 2 --threads 2 --timeout 180 ong_platform.wsgi:application
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8001"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - DATABASE_URL=postgresql://ong_user:ong_password@db:5432/ong_platform
      - ALLOWED_HOSTS=lms.appbemestar.com.br,162.240.98.188,localhost,127.0.0.1,80.91.86.135,lunar.salesforcedevhelp.com,salesforcedevhelp.com
    depends_on:
      db:
        condition: service_healthy
  nginx:
    image: nginx:alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
     - web


volumes:
  postgres_data:
  static_volume:
  media_volume:
